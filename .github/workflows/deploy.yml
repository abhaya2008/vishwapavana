name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sanskritam/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sanskritam/web

      - name: Build
        run: npm run build
        working-directory: sanskritam/web
        env:
          VITE_READONLY: 'true'
          VITE_BASE_URL: '/${{ github.event.repository.name }}/'
          # Baked into the build so all visitors read live data from GitHub
          VITE_GH_OWNER: ${{ github.repository_owner }}
          VITE_GH_REPO: ${{ github.event.repository.name }}
          VITE_GH_BRANCH: main
          VITE_GH_DATA_PATH: sanskritam/web/public/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sanskritam/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
